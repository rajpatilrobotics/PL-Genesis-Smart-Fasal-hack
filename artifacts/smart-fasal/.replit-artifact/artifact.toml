kind = "web"
previewPath = "/"
title = "Smart Fasal"
version = "1.0.0"
id = "artifacts/smart-fasal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20847

[services.development]
run = "pnpm --filter @workspace/smart-fasal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-fasal", "run", "build" ]
publicDir = "artifacts/smart-fasal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20847"
BASE_PATH = "/"
