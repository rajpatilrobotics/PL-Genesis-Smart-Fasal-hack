openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Smart Fasal Agriculture Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sensor
    description: IoT Sensor data operations
  - name: ai
    description: AI recommendation and analysis
  - name: weather
    description: Weather data
  - name: insurance
    description: Insurance and risk management
  - name: market
    description: Marketplace operations
  - name: community
    description: Community platform
  - name: filecoin
    description: Filecoin/IPFS storage
  - name: rewards
    description: Flow blockchain rewards
  - name: analytics
    description: Analytics and logs
  - name: lit
    description: Lit Protocol private farm data vault
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sensor-data:
    post:
      operationId: submitSensorData
      tags: [sensor]
      summary: Submit IoT sensor data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SensorDataInput"
      responses:
        "201":
          description: Sensor data stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SensorData"
    get:
      operationId: getLatestSensorData
      tags: [sensor]
      summary: Get latest sensor data
      responses:
        "200":
          description: Latest sensor reading
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SensorData"

  /sensor-data/history:
    get:
      operationId: getSensorHistory
      tags: [sensor]
      summary: Get sensor data history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Sensor history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SensorData"

  /ai-recommendation:
    post:
      operationId: getAiRecommendation
      tags: [ai]
      summary: Get AI-powered crop recommendation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiRecommendationInput"
      responses:
        "200":
          description: AI recommendation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRecommendation"

  /ai-recommendations/history:
    get:
      operationId: getAiRecommendationHistory
      tags: [ai]
      summary: Get AI recommendation history
      responses:
        "200":
          description: Recommendation history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiRecommendation"

  /disease-detect:
    post:
      operationId: detectDisease
      tags: [ai]
      summary: Detect crop disease from image description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiseaseDetectInput"
      responses:
        "200":
          description: Disease detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiseaseDetectResult"

  /disease-detections/history:
    get:
      operationId: getDiseaseHistory
      tags: [ai]
      summary: Get history of disease detection scans
      responses:
        "200":
          description: List of past disease scans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiseaseScanRecord"

  /weather:
    get:
      operationId: getWeather
      tags: [weather]
      summary: Get current weather data
      parameters:
        - name: lat
          in: query
          schema:
            type: number
        - name: lon
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Weather data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherData"

  /insurance/risk:
    get:
      operationId: getInsuranceRisk
      tags: [insurance]
      summary: Get current insurance risk assessment
      responses:
        "200":
          description: Risk assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceRisk"

  /insurance/claims:
    get:
      operationId: getInsuranceClaims
      tags: [insurance]
      summary: Get insurance claims
      responses:
        "200":
          description: List of claims
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InsuranceClaim"
    post:
      operationId: createInsuranceClaim
      tags: [insurance]
      summary: Submit an insurance claim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInsuranceClaimInput"
      responses:
        "201":
          description: Claim submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuranceClaim"

  /market/prices:
    get:
      operationId: getMarketPrices
      tags: [market]
      summary: Get live mandi prices
      responses:
        "200":
          description: Market prices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketPrice"

  /market/listings:
    get:
      operationId: getMarketListings
      tags: [market]
      summary: Get P2P marketplace listings
      responses:
        "200":
          description: Marketplace listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketListing"
    post:
      operationId: createMarketListing
      tags: [market]
      summary: Create a P2P listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMarketListingInput"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketListing"

  /market/listings/{id}/buy:
    post:
      operationId: buyMarketListing
      tags: [market]
      summary: Buy a marketplace listing (creates escrow)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmDeliveryInput"
      responses:
        "200":
          description: Purchase recorded and funds placed in escrow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketListing"

  /market/listings/{id}/confirm-delivery:
    post:
      operationId: confirmDelivery
      tags: [market]
      summary: Confirm delivery and release escrow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Delivery confirmed, Filecoin receipt stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketListing"

  /market/recommendations:
    get:
      operationId: getProductRecommendations
      tags: [market]
      summary: Get AI-based product recommendations
      responses:
        "200":
          description: Recommended products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductRecommendation"

  /community/posts:
    get:
      operationId: getCommunityPosts
      tags: [community]
      summary: Get community feed posts
      responses:
        "200":
          description: Community posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityPost"
    post:
      operationId: createCommunityPost
      tags: [community]
      summary: Create a community post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommunityPostInput"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPost"

  /community/posts/{id}/like:
    post:
      operationId: likeCommunityPost
      tags: [community]
      summary: Like a community post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post liked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPost"

  /community/posts/{id}/comments:
    post:
      operationId: addCommentToPost
      tags: [community]
      summary: Add comment to post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCommentInput"
      responses:
        "201":
          description: Comment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPost"

  /community/messages:
    get:
      operationId: getCommunityMessages
      tags: [community]
      summary: Get community chat messages
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendCommunityMessage
      tags: [community]
      summary: Send an encrypted community message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /community/experts:
    get:
      operationId: getCommunityExperts
      tags: [community]
      summary: Get list of agricultural experts
      responses:
        "200":
          description: Expert list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expert"

  /community/expert-questions:
    get:
      operationId: getExpertQuestions
      tags: [community]
      summary: Get questions asked to experts
      responses:
        "200":
          description: Expert questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpertQuestion"
    post:
      operationId: askExpertQuestion
      tags: [community]
      summary: Ask an expert a question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskExpertInput"
      responses:
        "201":
          description: Question submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpertQuestion"

  /filecoin/store:
    post:
      operationId: storeOnFilecoin
      tags: [filecoin]
      summary: Store data on Filecoin/IPFS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilecoinStoreInput"
      responses:
        "200":
          description: Data stored, returns CID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilecoinResult"

  /filecoin/records:
    get:
      operationId: getFilecoinRecords
      tags: [filecoin]
      summary: Get stored Filecoin records
      responses:
        "200":
          description: Filecoin storage records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FilecoinRecord"

  /lit/records:
    get:
      operationId: getLitVaultRecords
      tags: [lit]
      summary: Get encrypted farm data records for a wallet
      parameters:
        - name: farmerWallet
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of encrypted vault records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LitVaultRecord"

  /lit/encrypt:
    post:
      operationId: litEncryptFarmData
      tags: [lit]
      summary: Encrypt farm data and store on Filecoin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LitEncryptInput"
      responses:
        "200":
          description: Encrypted and stored successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LitVaultRecord"

  /lit/grant:
    post:
      operationId: litGrantAccess
      tags: [lit]
      summary: Grant a wallet address access to decrypt a vault record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LitGrantInput"
      responses:
        "200":
          description: Access granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LitVaultRecord"

  /lit/decrypt:
    post:
      operationId: litDecryptFarmData
      tags: [lit]
      summary: Decrypt farm data by proving wallet ownership via signed challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LitDecryptInput"
      responses:
        "200":
          description: Decrypted farm data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LitDecryptResult"

  /rewards:
    get:
      operationId: getRewards
      tags: [rewards]
      summary: Get user reward points and wallet info
      responses:
        "200":
          description: Rewards info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardsInfo"

  /rewards/connect-wallet:
    post:
      operationId: connectWallet
      tags: [rewards]
      summary: Connect Flow blockchain wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectWalletInput"
      responses:
        "200":
          description: Wallet connected and reward info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardsInfo"

  /rewards/add:
    post:
      operationId: addRewardPoints
      tags: [rewards]
      summary: Add reward points for an activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddRewardInput"
      responses:
        "200":
          description: Updated rewards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardsInfo"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get analytics summary and logs
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/logs:
    get:
      operationId: getAnalyticsLogs
      tags: [analytics]
      summary: Get system event logs
      responses:
        "200":
          description: Event logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventLog"

  /credit/seasons:
    post:
      operationId: submitCreditSeason
      tags: [credit]
      summary: Submit a season's farming record and compute credit score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditSeasonInput"
      responses:
        "200":
          description: Created season record with credit score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditSeasonRecord"
    get:
      operationId: getCreditSeasons
      tags: [credit]
      summary: Get all season records for the farmer
      parameters:
        - name: farmerId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of season records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CreditSeasonRecord"

  /credit/profile:
    get:
      operationId: getCreditProfile
      tags: [credit]
      summary: Get farmer credit profile with overall score and history
      parameters:
        - name: farmerId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Credit profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditProfile"

  /credit/verify/{cid}:
    get:
      operationId: verifyCreditRecord
      tags: [credit]
      summary: Publicly verify a credit record by IPFS CID
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verified record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditSeasonRecord"
        "404":
          description: Record not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SensorDataInput:
      type: object
      properties:
        nitrogen:
          type: number
        phosphorus:
          type: number
        potassium:
          type: number
        ph:
          type: number
        moisture:
          type: number
        deviceId:
          type: ["string", "null"]
      required:
        - nitrogen
        - phosphorus
        - potassium
        - ph
        - moisture

    SensorData:
      type: object
      properties:
        id:
          type: integer
        nitrogen:
          type: number
        phosphorus:
          type: number
        potassium:
          type: number
        ph:
          type: number
        moisture:
          type: number
        deviceId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - nitrogen
        - phosphorus
        - potassium
        - ph
        - moisture
        - createdAt

    AiRecommendationInput:
      type: object
      properties:
        nitrogen:
          type: number
        phosphorus:
          type: number
        potassium:
          type: number
        ph:
          type: number
        moisture:
          type: number
        temperature:
          type: ["number", "null"]
        humidity:
          type: ["number", "null"]
        rainfall:
          type: ["number", "null"]
      required:
        - nitrogen
        - phosphorus
        - potassium
        - ph
        - moisture

    AiRecommendation:
      type: object
      properties:
        id:
          type: integer
        fertilizerAdvice:
          type: string
        irrigationSuggestion:
          type: string
        riskAnalysis:
          type: string
        cropHealthPercent:
          type: number
        riskLevel:
          type: string
        yieldPercent:
          type: number
        nitrogen:
          type: number
        phosphorus:
          type: number
        potassium:
          type: number
        ph:
          type: number
        moisture:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - fertilizerAdvice
        - irrigationSuggestion
        - riskAnalysis
        - cropHealthPercent
        - riskLevel
        - yieldPercent
        - nitrogen
        - phosphorus
        - potassium
        - ph
        - moisture
        - createdAt

    DiseaseDetectInput:
      type: object
      properties:
        imageDescription:
          type: ["string", "null"]
        imageBase64:
          type: ["string", "null"]
          description: Base64-encoded image data (without data URI prefix) for vision analysis
        imageMimeType:
          type: ["string", "null"]
          description: MIME type of the image, e.g. image/jpeg
        cropName:
          type: ["string", "null"]
      required: []

    DiseaseDetectResult:
      type: object
      properties:
        id:
          type: integer
        plantName:
          type: string
        diseaseName:
          type: string
        confidencePercent:
          type: number
        treatment:
          type: string
        severity:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - plantName
        - diseaseName
        - confidencePercent
        - treatment
        - severity
        - createdAt

    WeatherData:
      type: object
      properties:
        temperature:
          type: number
        humidity:
          type: number
        rainfall:
          type: number
        description:
          type: string
        location:
          type: string
        windSpeed:
          type: number
        feelsLike:
          type: number
        updatedAt:
          type: string
          format: date-time
      required:
        - temperature
        - humidity
        - rainfall
        - description
        - location
        - windSpeed
        - feelsLike
        - updatedAt

    InsuranceRisk:
      type: object
      properties:
        riskLevel:
          type: string
        riskScore:
          type: number
        eligibleForClaim:
          type: boolean
        reasons:
          type: array
          items:
            type: string
        recommendations:
          type: array
          items:
            type: string
      required:
        - riskLevel
        - riskScore
        - eligibleForClaim
        - reasons
        - recommendations

    InsuranceClaim:
      type: object
      properties:
        id:
          type: integer
        claimType:
          type: string
        riskLevel:
          type: string
        description:
          type: string
        status:
          type: string
        rewardPoints:
          type: integer
        walletAddress:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - claimType
        - riskLevel
        - description
        - status
        - rewardPoints
        - createdAt

    CreateInsuranceClaimInput:
      type: object
      properties:
        claimType:
          type: string
        description:
          type: string
        walletAddress:
          type: ["string", "null"]
      required:
        - claimType
        - description

    MarketPrice:
      type: object
      properties:
        id:
          type: integer
        crop:
          type: string
        price:
          type: number
        unit:
          type: string
        market:
          type: string
        state:
          type: string
        change:
          type: number
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - crop
        - price
        - unit
        - market
        - state
        - change
        - updatedAt

    MarketListing:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        crop:
          type: string
        price:
          type: number
        quantity:
          type: number
        unit:
          type: string
        sellerName:
          type: string
        sellerWallet:
          type: ["string", "null"]
        location:
          type: string
        status:
          type: string
        imageCid:
          type: ["string", "null"]
        receiptCid:
          type: ["string", "null"]
        escrowStatus:
          type: string
        buyerName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - crop
        - price
        - quantity
        - unit
        - sellerName
        - location
        - status
        - escrowStatus
        - createdAt

    CreateMarketListingInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        crop:
          type: string
        price:
          type: number
        quantity:
          type: number
        unit:
          type: string
        sellerName:
          type: string
        sellerWallet:
          type: ["string", "null"]
        location:
          type: string
        imageBase64:
          type: ["string", "null"]
      required:
        - title
        - description
        - crop
        - price
        - quantity
        - unit
        - sellerName
        - location

    ConfirmDeliveryInput:
      type: object
      properties:
        buyerName:
          type: string
      required:
        - buyerName

    BuyLink:
      type: object
      properties:
        platform:
          type: string
        label:
          type: string
        url:
          type: string
        color:
          type: string
      required:
        - platform
        - label
        - url
        - color

    ProductRecommendation:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        brand:
          type: string
        category:
          type: string
        description:
          type: string
        price:
          type: number
        mrp:
          type: number
        reason:
          type: string
        rating:
          type: number
        buyLinks:
          type: array
          items:
            $ref: "#/components/schemas/BuyLink"
      required:
        - id
        - name
        - brand
        - category
        - description
        - price
        - mrp
        - reason
        - rating
        - buyLinks

    CommunityPost:
